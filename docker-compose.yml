services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports: ["5434:5432"]
    environment:
      POSTGRES_DB: company_brain
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d company_brain"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      DATABASE_URL: postgresql://dev:dev@postgres:5432/langfuse
      NEXTAUTH_SECRET: langfuse-dev-secret
      NEXTAUTH_URL: http://localhost:3001
      SALT: langfuse-dev-salt
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_data:
