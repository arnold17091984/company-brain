# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path additions (comma separated)
prepend_sys_path = .

# Timezone for %%(year)d etc. in file_template
# timezone =

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Version number format, override for custom formatting
# version_num_format = %%(num)08d

# Version path separator; default is os.pathsep
# version_path_separator = os  # use os.pathsep

# The output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# DATABASE_URL is read dynamically in alembic/env.py from pydantic-settings.
# Do NOT hardcode credentials here.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
