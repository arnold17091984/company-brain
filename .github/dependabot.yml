version: 2

updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
    # Group all Actions updates into a single PR to reduce noise.
    groups:
      github-actions:
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # npm – apps/web
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(web)"
    # Separate production and dev dependency PRs so reviewers know the blast
    # radius of each update.
    groups:
      web-production:
        dependency-type: production
        patterns:
          - "*"
      web-development:
        dependency-type: development
        patterns:
          - "*"
    # Ignore major Next.js bumps – these require manual upgrade testing.
    ignore:
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # pip – apps/api
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(api)"
    groups:
      api-dependencies:
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # pip – apps/bot
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /apps/bot
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(bot)"
    groups:
      bot-dependencies:
        patterns:
          - "*"
